{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card mt-5">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Settings</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('settings') }}">
                    <h5 class="mb-3">Question Timer Settings</h5>
                    <div class="mb-3 row align-items-center">
                        <label class="col-sm-6 col-form-label">Multiple Choice Timer (seconds)</label>
                        <div class="col-sm-6">
                            <input type="number" class="form-control" name="timer_mc" min="5" max="3600" value="{{ timer_mc or 180 }}">
                        </div>
                    </div>
                    <div class="mb-3 row align-items-center">
                        <label class="col-sm-6 col-form-label">True/False Timer (seconds)</label>
                        <div class="col-sm-6">
                            <input type="number" class="form-control" name="timer_tf" min="5" max="3600" value="{{ timer_tf or 180 }}">
                        </div>
                    </div>
                    <div class="mb-3 row align-items-center">
                        <label class="col-sm-6 col-form-label">Open-ended Timer (seconds)</label>
                        <div class="col-sm-6">
                            <input type="number" class="form-control" name="timer_oe" min="5" max="3600" value="{{ timer_oe or 180 }}">
                        </div>
                    </div>
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary">Save Settings</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
